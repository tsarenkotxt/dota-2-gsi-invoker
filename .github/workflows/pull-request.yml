name: Pull Request

on:
  pull_request:

permissions:
  contents: read

env:
  RUST_VERSION: 1.95.0

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install "${RUST_VERSION}" --profile minimal
          rustup default "${RUST_VERSION}"

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libxkbcommon-dev libwayland-dev libxcb1-dev

      - name: Install Rust components and fetch dependencies
        run: make init

      - name: Run format check, tests, and Clippy
        run: make test
